<!DOCTYPE html>
<html>
<head>
<title>MIKASA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:linear-gradient(135deg,#0a0a0f,#000814);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Orbitron',sans-serif;
color:#ff4dff;
}

.container{
text-align:center;
}

h1{
font-size:36px;
letter-spacing:4px;
text-shadow:0 0 20px #ff4dff;
}

/* Female Robot Head */
.robot{
width:240px;
height:260px;
background:#111;
border-radius:50% 50% 45% 45%;
border:3px solid #ff4dff;
position:relative;
margin:auto;
box-shadow:0 0 40px #ff4dff;
cursor:pointer;
transition:0.3s;
}

.robot:hover{
transform:scale(1.05);
box-shadow:0 0 80px #ff4dff;
}

/* Hair Glow */
.hair{
width:260px;
height:120px;
background:linear-gradient(90deg,#ff00ff,#9900ff);
position:absolute;
top:-40px;
left:-10px;
border-radius:50%;
filter:blur(20px);
opacity:0.7;
}

/* Eyes */
.eye{
width:35px;
height:35px;
background:#ff4dff;
border-radius:50%;
position:absolute;
top:90px;
animation:blink 4s infinite;
}

.left-eye{left:60px;}
.right-eye{right:60px;}

@keyframes blink{
0%,90%,100%{height:35px;}
95%{height:5px;}
}

/* Mouth */
.mouth{
width:80px;
height:8px;
background:#ff4dff;
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
}

p{
margin-top:20px;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">
<h1>MIKASA AI</h1>

<div class="robot" onclick="startAI()">
<div class="hair"></div>
<div class="eye left-eye"></div>
<div class="eye right-eye"></div>
<div class="mouth"></div>
</div>

<p>Click Mikasa to Activate</p>
</div>

<script>
function startAI(){
fetch("http://127.0.0.1:5000/start");
}
</script>

</body>
</html>
